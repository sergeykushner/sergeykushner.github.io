<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Redirecting...</title>
    <script>
        window.location.replace(`/app.html${window.location.search}`);
    </script>
</head>

<body>
    <p><a id="redirect-link" href="/app.html">Open app page</a></p>
    <script>
        document.getElementById('redirect-link').href = `/app.html${window.location.search}`;
    </script>
</body>

</html>
